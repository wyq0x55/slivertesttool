{% extends "lanmatrix/base_lm.html" %}
{% block title %}项目列表{% endblock %}
{% block content %}
<div class="lm-page">
  <div class="lm-page-head">
    <h1>测试矩阵项目</h1>
    <div>
      <button class="lm-btn" id="lm-import-new">导入 Excel 新建</button>
      <button class="lm-btn lm-btn-primary" id="lm-new-project">新建空白项目</button>
    </div>
  </div>
  <input type="file" id="lm-import-file" accept=".xlsx" hidden>
  <table class="lm-table lm-projects">
    <thead>
      <tr><th>编码</th><th>名称</th><th>状态</th><th>成员</th><th>更新时间</th><th></th></tr>
    </thead>
    <tbody id="lm-project-rows">
      <tr><td colspan="6" class="lm-muted">加载中…</td></tr>
    </tbody>
  </table>
</div>

<dialog id="lm-new-dialog" class="lm-dialog">
  <form method="dialog" class="lm-card">
    <h3>新建空白项目</h3>
    <label>项目编码 <input id="lm-np-code" required placeholder="VHILS1_RWS"></label>
    <label>项目名称 <input id="lm-np-name" placeholder="RWS MCU 资格测试"></label>
    <label>描述 <textarea id="lm-np-desc" rows="2"></textarea></label>
    <div class="lm-error" id="lm-np-error" hidden></div>
    <menu>
      <button value="cancel" class="lm-btn">取消</button>
      <button value="ok" id="lm-np-ok" class="lm-btn lm-btn-primary">创建</button>
    </menu>
  </form>
</dialog>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/lanmatrix/projects.js') }}"></script>
{% endblock %}
